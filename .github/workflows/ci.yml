name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./unit_tests/... -v

      - name: Run integration tests
        run: go test -v

      - name: Build linter
        run: go build -o loglint ./cmd/loglint

      - name: Run linter
        run: ./loglint ./cmd/... ./logcheck/...
